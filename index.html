<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酱文化美食节</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .hero-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('webpage1/photo1.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }
        .nav-bar {
            position: absolute;
            top: 8%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10%;
        }
        .nav-btn {
            text-decoration: none;
            color: #ffffff; /* 白色字体 */
            font-size: 16px;
            font-weight: 500;
            padding: 5px 0;
            position: relative;
            cursor: pointer; /* 小手光标 */
            transition: all 0.3s ease;
        }
        /* 悬停变色：金色 */
        .nav-btn:hover {
            color: #ffd700;
        }
        /* 美化下划线动画（代替矩形框） */
        .nav-btn::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #ffd700;
            transition: width 0.3s ease;
        }
        .nav-btn:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="nav-bar">
            <a href="brand-analysis.html" class="nav-btn">品牌分析</a>
            <a href="logo.html" class="nav-btn">品牌标志</a>
            <a href="color.html" class="nav-btn">品牌标准色</a>
            <a href="graphic.html" class="nav-btn">品牌辅助图形</a>
            <a href="ip.html" class="nav-btn">IP形象</a>
        </div>
    </div>
</body>
</html>
