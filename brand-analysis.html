<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .page-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('webpage1/photo2.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
        }
        /* 顶部导航栏（和主页保持一致） */
        .nav-bar {
            position: absolute;
            top: 8%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10%;
        }
        .nav-btn {
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            padding: 5px 0;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            color: #ffd700;
        }
        .nav-btn::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #ffd700;
            transition: width 0.3s ease;
        }
        .nav-btn:hover::after {
            width: 100%;
        }
        /* 左下角返回按钮 */
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            text-decoration: none;
            color: #d45b33;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid #d45b33;
            border-radius: 6px;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #d45b33;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 顶部导航（和主页一样的5个按钮） -->
        <a href="index.html" class="back-btn">← 返回主页</a>
        <div class="nav-bar">
            <a href="brand-analysis.html" class="nav-btn">品牌分析</a>
            <a href="logo.html" class="nav-btn">品牌标志</a>
            <a href="color.html" class="nav-btn">品牌标准色</a>
            <a href="graphic.html" class="nav-btn">品牌辅助图形</a>
            <a href="ip.html" class="nav-btn">IP形象</a>
        </div>
        <!-- 返回主页按钮 -->
    </div>
</body>
</html>
